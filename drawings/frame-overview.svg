    <rect x="825" y="176" width="54" height="16"/>
    <rect x="865" y="208" width="50" height="16"/>
    <rect x="905" y="176" width="46" height="15"/>
  </g>

  <g fill="none" stroke="#1b4d66" stroke-width="2">
    <line x1="220" y1="410" x2="220" y2="540"/>
    <line x1="315" y1="410" x2="315" y2="515"/>
    <line x1="410" y1="410" x2="410" y2="495"/>
    <line x1="505" y1="410" x2="505" y2="475"/>
