  <path d="M 150 240 C 360 215 640 215 950 245" fill="none" stroke="#7b4b26" stroke-width="20"/>
  <path d="M 150 360 C 360 330 650 330 950 370" fill="none" stroke="#7b4b26" stroke-width="20"/>
  <text x="860" y="226" font-size="12">treble rail follows node_1 path</text>
  <text x="850" y="402" font-size="12">bass rail follows node_2 path</text>

  <g fill="#f7ead7" stroke="#222">
    <rect x="145" y="176" width="150" height="22" transform="rotate(-4 145 176)"/>
    <rect x="205" y="208" width="140" height="22" transform="rotate(-3 205 208)"/>
    <rect x="275" y="176" width="128" height="21" transform="rotate(-2 275 176)"/>
    <rect x="335" y="208" width="118" height="21" transform="rotate(-1 335 208)"/>
    <rect x="405" y="176" width="108" height="20"/>
    <rect x="465" y="208" width="100" height="20"/>
    <rect x="525" y="176" width="92" height="19"/>
    <rect x="580" y="208" width="86" height="19"/>
    <rect x="635" y="176" width="78" height="18"/>
    <rect x="685" y="208" width="72" height="18"/>
    <rect x="735" y="176" width="66" height="17"/>
