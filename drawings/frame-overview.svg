  <text x="150" y="568" font-size="12" fill="#1b4d66">resonator centerlines below bars; exact bore and spacing TBD after sourcing</text>

  <rect x="32" y="475" width="360" height="92" fill="#fafafa" stroke="#333"/>
  <text x="48" y="500" font-size="12" font-weight="bold">Frame release checks</text>
  <text x="48" y="520" font-size="11">1. Bar supports land at nodes, not at equal end offsets.</text>
  <text x="48" y="538" font-size="11">2. Tubes clear bars and rails at full vibration.</text>
  <text x="48" y="556" font-size="11">3. Cross members remain removable during tuning.</text>
